<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>青いドラゴン AR</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.8/aframe/build/aframe-ar.js"></script>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.ui{position:fixed;inset:0;z-index:10;pointer-events:none;color:white}.top{position:absolute;top:0;left:0;right:0;text-align:center;padding:max(16px,env(safe-area-inset-top)) 12px 32px;background:linear-gradient(#061326f2,transparent)}
h1{margin:0;font-size:22px}#status{display:inline-block;margin-top:8px;padding:7px 13px;border-radius:999px;background:#0009;font-size:13px}
.guide{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:min(74vw,330px);aspect-ratio:1;border:2px solid #ffffffb8;border-radius:20px;transition:.25s}
.guide.found{border-color:#70e5ff;box-shadow:0 0 38px #24cfffaa}.bottom{position:absolute;bottom:0;left:0;right:0;text-align:center;padding:22px 16px max(24px,env(safe-area-inset-bottom));background:linear-gradient(transparent,#061326f2)}
button{pointer-events:auto;border:0;border-radius:999px;padding:15px 28px;font-weight:800;font-size:17px;background:linear-gradient(135deg,#e3faff,#64dcff);color:#061326;opacity:.35}button.ready{opacity:1}
#bubble{position:absolute;left:50%;top:20%;transform:translate(-50%,-15px);width:min(88vw,420px);padding:18px;background:#071c38f2;border:1px solid #ffffff33;border-radius:22px;text-align:center;opacity:0;transition:.25s}
#bubble.show{opacity:1;transform:translate(-50%,0)}#bubble strong{display:block;color:#85eaff;font-size:23px;margin-bottom:6px}
</style>
<script>
AFRAME.registerComponent('float-idle',{init(){this.t=0},tick(t,d){this.t+=d/1000;this.el.object3D.position.y=.14+Math.sin(this.t*2)*.06;this.el.object3D.rotation.y=Math.sin(this.t*.8)*.12}})
</script>

<style>
html, body {
  background: transparent !important;
}
#arjs-video {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: -1 !important;
  display: block !important;
}
a-scene {
  position: fixed !important;
  inset: 0 !important;
  z-index: 1 !important;
  background: transparent !important;
}
.ui {
  z-index: 10 !important;
}
</style>

</head>
<body>
<div class="ui">
<div class="top"><h1>🐉 青いドラゴン「ルゥ」</h1><div id="status">マーカーを探しています…</div></div>
<div id="guide" class="guide"></div>
<div id="bubble"><strong>ルゥ</strong>「やっと会えたね！一緒に魔法石を探そう！」</div>
<div class="bottom"><button id="talk" disabled>ルゥに話しかける</button></div>
</div>
<a-scene embedded vr-mode-ui="enabled:false" renderer="antialias:true;alpha:true;colorManagement:true" arjs="sourceType:webcam;trackingMethod:best;debugUIEnabled:false;detectionMode:mono;">
<a-assets><a-asset-item id="dragonModel" src="dragon-blue.glb"></a-asset-item></a-assets>
<a-marker id="marker" preset="hiro" emitevents="true" smooth="true" smooth-count="12" smooth-tolerance=".01" smooth-threshold="5">
<a-entity float-idle position="0 .14 0" rotation="0 180 0" scale=".68 .68 .68">
<a-gltf-model src="#dragonModel"></a-gltf-model>
</a-entity>
<a-circle position="0 .01 0" rotation="-90 0 0" radius=".82" material="color:#58dcff;transparent:true;opacity:.14" animation="property:scale;dir:alternate;dur:1000;loop:true;to:1.18 1.18 1.18"></a-circle>
</a-marker>
<a-entity camera></a-entity>
</a-scene>
<script>
const m=document.getElementById('marker'),s=document.getElementById('status'),g=document.getElementById('guide'),b=document.getElementById('talk'),q=document.getElementById('bubble');
m.addEventListener('markerFound',()=>{s.textContent='ルゥを発見！';g.classList.add('found');b.disabled=false;b.classList.add('ready');navigator.vibrate?.([80,40,80])});
m.addEventListener('markerLost',()=>{s.textContent='マーカーを探しています…';g.classList.remove('found');b.disabled=true;b.classList.remove('ready');q.classList.remove('show')});
b.onclick=()=>{q.classList.add('show');navigator.vibrate?.([60,30,110]);setTimeout(()=>q.classList.remove('show'),4000)}
</script>

<script>
window.addEventListener('load', () => {
  const fixCamera = () => {
    const video = document.querySelector('#arjs-video, video');
    if (!video) return;

    Object.assign(video.style, {
      position: 'fixed',
      top: '0',
      left: '0',
      width: '100vw',
      height: '100vh',
      objectFit: 'cover',
      zIndex: '-1',
      display: 'block'
    });

    document.documentElement.style.background = 'transparent';
    document.body.style.background = 'transparent';
  };

  fixCamera();
  setTimeout(fixCamera, 500);
  setTimeout(fixCamera, 1500);
  setTimeout(fixCamera, 3000);
});
</script>

</body></html>
