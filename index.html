<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#061326">
<title>魔法陣 AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.8/aframe/build/aframe-ar.js"></script>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;
  background:transparent!important;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif
}
#arjs-video{
  position:fixed!important;top:0!important;left:0!important;
  width:100vw!important;height:100vh!important;
  object-fit:cover!important;z-index:-1!important
}
a-scene{
  position:fixed!important;inset:0!important;
  background:transparent!important
}
.ui{position:fixed;inset:0;z-index:10;pointer-events:none;color:#fff}
.top{
  position:absolute;top:0;left:0;right:0;text-align:center;
  padding:max(16px,env(safe-area-inset-top)) 14px 35px;
  background:linear-gradient(180deg,rgba(3,10,25,.92),transparent)
}
h1{margin:0;font-size:22px;letter-spacing:.08em;text-shadow:0 3px 12px #000}
#status{
  display:inline-block;margin-top:8px;padding:7px 13px;
  border-radius:999px;background:rgba(0,0,0,.58);font-size:13px
}
.guide{
  position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
  width:min(74vw,330px);aspect-ratio:1;border:2px solid rgba(255,255,255,.68);
  border-radius:22px;transition:.25s
}
.guide.found{
  border-color:#72e9ff;
  box-shadow:0 0 40px rgba(64,220,255,.9)
}
.bottom{
  position:absolute;left:0;right:0;bottom:0;text-align:center;
  padding:20px 16px max(24px,env(safe-area-inset-bottom));
  background:linear-gradient(0deg,rgba(3,10,25,.94),transparent)
}
#castBtn{
  pointer-events:auto;border:0;border-radius:999px;padding:15px 28px;
  min-width:230px;font-weight:900;font-size:17px;color:#061326;
  background:linear-gradient(135deg,#e7fbff,#65e6ff);
  box-shadow:0 8px 28px rgba(51,219,255,.38);
  opacity:.35;transform:scale(.97);transition:.2s
}
#castBtn.ready{opacity:1;transform:scale(1)}
#message{
  position:absolute;left:50%;top:20%;transform:translate(-50%,-14px) scale(.94);
  width:min(88vw,420px);padding:18px 20px;border-radius:22px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(5,18,40,.92);backdrop-filter:blur(12px);
  text-align:center;opacity:0;transition:.28s
}
#message.show{opacity:1;transform:translate(-50%,0) scale(1)}
#message strong{display:block;font-size:24px;color:#8ff1ff;margin-bottom:6px}
</style>

<script>
AFRAME.registerComponent('magic-float',{
  init(){this.t=0},
  tick(t,d){
    this.t+=d/1000;
    this.el.object3D.position.y=.035+Math.sin(this.t*2.1)*.015;
  }
});

AFRAME.registerComponent('sparkle-orbit',{
  schema:{speed:{default:1},radius:{default:.65},offset:{default:0}},
  init(){this.t=this.data.offset},
  tick(t,d){
    this.t+=d/1000*this.data.speed;
    const r=this.data.radius;
    this.el.object3D.position.set(
      Math.cos(this.t)*r,
      .10+Math.sin(this.t*2)*.08,
      Math.sin(this.t)*r
    );
  }
});
</script>
</head>

<body>
<div class="ui">
  <div class="top">
    <h1>✦ 古代魔法陣 AR ✦</h1>
    <div id="status">マーカーを探しています…</div>
  </div>

  <div id="guide" class="guide"></div>

  <div id="message">
    <strong>魔法陣が起動しました</strong>
    <span>光の力が集まっています…</span>
  </div>

  <div class="bottom">
    <button id="castBtn" disabled>魔法陣を起動する</button>
  </div>
</div>

<a-scene embedded
  vr-mode-ui="enabled:false"
  renderer="antialias:true;alpha:true;logarithmicDepthBuffer:true;colorManagement:true"
  arjs="sourceType:webcam;trackingMethod:best;debugUIEnabled:false;detectionMode:mono;">

  <a-marker id="marker" preset="hiro" emitevents="true"
    smooth="true" smooth-count="12" smooth-tolerance=".01" smooth-threshold="5">

    <a-entity id="circle" magic-float position="0 .035 0">

      <!-- 外周リング -->
      <a-torus rotation="90 0 0" radius=".82" radius-tubular=".025"
        material="color:#7cecff;emissive:#147ea3;emissiveIntensity:1.1"
        animation="property:rotation;dur:9000;loop:true;to:90 0 360;easing:linear">
      </a-torus>

      <a-torus rotation="90 0 0" radius=".68" radius-tubular=".012"
        material="color:#c3f8ff;emissive:#238ead;emissiveIntensity:.9"
        animation="property:rotation;dur:7000;loop:true;to:90 0 -360;easing:linear">
      </a-torus>

      <!-- 魔法陣の円盤 -->
      <a-circle rotation="-90 0 0" radius=".78"
        material="color:#28c8ef;transparent:true;opacity:.12;side:double">
      </a-circle>

      <!-- 六芒星 -->
      <a-triangle rotation="-90 0 0"
        vertex-a="0 .66 0" vertex-b="-.57 -.33 0" vertex-c=".57 -.33 0"
        material="color:#9befff;wireframe:true;transparent:true;opacity:.92;side:double">
      </a-triangle>

      <a-triangle rotation="-90 0 180"
        vertex-a="0 .66 0" vertex-b="-.57 -.33 0" vertex-c=".57 -.33 0"
        material="color:#9befff;wireframe:true;transparent:true;opacity:.92;side:double">
      </a-triangle>

      <!-- 中央ルーン -->
      <a-ring rotation="-90 0 0" radius-inner=".18" radius-outer=".23"
        material="color:#ffffff;emissive:#63dfff;emissiveIntensity:1.2;transparent:true;opacity:.95">
      </a-ring>

      <a-ring rotation="-90 0 0" radius-inner=".30" radius-outer=".315"
        material="color:#72e9ff;emissive:#168daf;emissiveIntensity:1;transparent:true;opacity:.85"
        animation="property:rotation;dur:4500;loop:true;to:-90 0 360;easing:linear">
      </a-ring>

      <!-- ルーン文字風 -->
      <a-text value="A  R  C  A  N  A"
        align="center" color="#d9fbff" width="2.2"
        position="0 .045 .44" rotation="-90 0 0">
      </a-text>

      <a-text value="L  U  M  E  N"
        align="center" color="#d9fbff" width="1.7"
        position="0 .048 -.43" rotation="-90 180 0">
      </a-text>

      <!-- 光の柱 -->
      <a-cylinder id="beam" position="0 .55 0" radius=".24" height="1.1"
        material="color:#5fe8ff;transparent:true;opacity:.10;side:double"
        visible="false">
      </a-cylinder>

      <!-- 浮遊する光 -->
      <a-sphere radius=".038" color="#ffffff"
        material="emissive:#ffffff;emissiveIntensity:1.3"
        sparkle-orbit="speed:1.8;radius:.62;offset:0">
      </a-sphere>

      <a-sphere radius=".028" color="#a8f4ff"
        material="emissive:#77eaff;emissiveIntensity:1.2"
        sparkle-orbit="speed:-1.5;radius:.48;offset:2">
      </a-sphere>

      <a-sphere radius=".022" color="#fff4af"
        material="emissive:#ffe46e;emissiveIntensity:1.1"
        sparkle-orbit="speed:2.3;radius:.72;offset:4">
      </a-sphere>

      <!-- 床の光 -->
      <a-circle rotation="-90 0 0" radius=".9"
        material="color:#4addff;transparent:true;opacity:.08"
        animation="property:scale;dir:alternate;dur:1200;loop:true;to:1.12 1.12 1.12;easing:easeInOutSine">
      </a-circle>

    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
const marker=document.getElementById('marker');
const statusEl=document.getElementById('status');
const guide=document.getElementById('guide');
const btn=document.getElementById('castBtn');
const message=document.getElementById('message');
const beam=document.getElementById('beam');

marker.addEventListener('markerFound',()=>{
  statusEl.textContent='魔法陣を発見！';
  guide.classList.add('found');
  btn.disabled=false;
  btn.classList.add('ready');
  navigator.vibrate?.([80,40,80]);
});

marker.addEventListener('markerLost',()=>{
  statusEl.textContent='マーカーを探しています…';
  guide.classList.remove('found');
  btn.disabled=true;
  btn.classList.remove('ready');
  message.classList.remove('show');
  beam.setAttribute('visible','false');
});

btn.addEventListener('click',()=>{
  message.classList.add('show');
  beam.setAttribute('visible','true');
  beam.setAttribute('animation__beam',{
    property:'scale',
    from:'0.2 0.2 0.2',
    to:'1 1 1',
    dur:700,
    easing:'easeOutElastic'
  });
  navigator.vibrate?.([80,40,80,40,180]);
  setTimeout(()=>message.classList.remove('show'),3200);
  setTimeout(()=>beam.setAttribute('visible','false'),4000);
});

window.addEventListener('load',()=>{
  const fix=()=>{
    const v=document.querySelector('#arjs-video,video');
    if(v){
      Object.assign(v.style,{
        position:'fixed',top:'0',left:'0',
        width:'100vw',height:'100vh',
        objectFit:'cover',zIndex:'-1'
      });
    }
  };
  fix();
  setTimeout(fix,500);
  setTimeout(fix,1500);
});
</script>
</body>
</html>
