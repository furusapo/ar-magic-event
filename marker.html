<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARマーカー印刷用</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eee;color:#111;text-align:center}
.page{width:210mm;min-height:297mm;margin:10mm auto;background:#fff;padding:18mm;box-sizing:border-box}
h1{font-size:26px;margin:0 0 8px}.sub{font-size:15px;margin-bottom:20px}
img{width:145mm;height:145mm;object-fit:contain;display:block;margin:10mm auto}
.note{font-size:14px;line-height:1.7}.no-print{margin:20px}
button{font-size:18px;padding:12px 28px;border:0;border-radius:999px;background:#111;color:#fff}
@media print{body{background:#fff}.page{margin:0}.no-print{display:none}}
@media(max-width:800px){.page{width:100%;min-height:auto;margin:0;padding:24px}img{width:82vw;height:82vw}}
</style>
</head>
<body>
<div class="no-print"><button onclick="window.print()">このマーカーを印刷する</button></div>
<div class="page">
<h1>魔法石 探索マーカー</h1>
<div class="sub">スマートフォンのAR画面で、下のマーカー全体を映してください。</div>
<img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" alt="HIRO AR marker">
<div class="note">
<strong>印刷のコツ</strong><br>
白い紙・カラーまたは白黒印刷／黒い外枠を切らない／反射の少ない場所に設置<br>
目安：マーカー部分を12〜15cm角以上で印刷してください。
</div>
</div>
</body>
</html>
